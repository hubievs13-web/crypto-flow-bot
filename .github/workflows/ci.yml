name: CI

# Lint + type-check + tests on every PR and every push to main.
# fly-deploy.yml waits on this workflow (via `workflow_run`) so a broken
# commit on main does not get rolled out to Fly.

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    name: ruff + mypy + pytest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install dev dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: ruff
        run: python -m ruff check
      - name: mypy
        run: python -m mypy src
      - name: pytest
        run: python -m pytest -q

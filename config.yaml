# crypto-flow-bot — high-conviction thresholds.
#
# Goal of this config: fewer signals, but each one is meant to be tradable.
# Expect 0–3 entry alerts per day in calm markets, more during a real squeeze.
# If you want more frequent alerts, loosen the numbers in the "signals" block.

# Symbols to watch (Binance USD-M perpetual futures).
symbols:
  - BTCUSDT
  - ETHUSDT
  - SOLUSDT

# How often to poll funding/OI/LSR/price (seconds).
poll_interval_seconds: 60

# How often to re-evaluate open virtual positions (seconds).
exit_check_interval_seconds: 5

# Minimum gap between two entry alerts on the same symbol+direction (seconds).
# 2h cooldown stops the bot from re-firing while a metric oscillates around a threshold.
alert_cooldown_seconds: 7200  # 2h

# ─── Entry signals ──────────────────────────────────────────────────────────
# A "signal" fires when its rule says so AND no other signal has fired for the
# same symbol+direction within the cooldown window. Multiple signals are OR-ed
# (any of them is enough). The signal engine reports which rule(s) fired.

signals:
  # Cross-snapshot confluence window. The signal engine remembers which rules
  # fired in each direction for the last X minutes (per symbol). Two effects:
  #   1. STRONG-marker uses this rolling set, not a single snapshot, so a
  #      slow trigger (funding/LSR) can pair with a fast one (liq/OI) that
  #      fires moments later.
  #   2. `funding_extreme_requires_confirmation` (below) drops funding-only
  #      candidates unless something else in this window agrees with them.
  confluence_window_minutes: 30

  # Funding-only entries lose money in our logs (-3.98% net across 23 trades),
  # because funding can stay extreme for days without a turn. Require at
  # least one other rule in the confluence window to confirm before opening.
  funding_extreme_requires_confirmation: true

  # Calibrated against ACTUAL Binance funding data observed on May 7, 2026
  # (provided by user via Coinglass screenshots):
  #
  #   BTC Binance funding — current: -0.0027%, 1d cumulative: -0.008%,
  #     7d cumulative: -0.0556% (avg per 8h: -0.0026%). Whole-2-day chart
  #     amplitude: -0.008% to +0.003%.
  #   ETH Binance funding similar, slightly less extreme.
  #   SOL Binance funding INVERTED: 7d cumulative +0.0742% (longs paying).
  #     This regime difference is why per-symbol values are asymmetric.
  #
  # Thresholds target the rare-tail of the distribution observed on that
  # specific exchange (Binance). They are aggressive on purpose: in this
  # low-vol regime even the "top 5%" excursions are tiny in absolute terms.
  # Risk-controls (max 2 concurrent, max 3 SL/day, trailing) are the firewall.
  #
  # Phase 2 (next PR, after ~7–14 days of snapshots.jsonl history) replaces
  # these statics with rolling z-score / percentile thresholds that
  # auto-adjust to the current regime per coin per direction.
  #
  # Globals are slightly tighter than per-symbol so an added symbol without
  # an explicit block (e.g. DOGE) stays safe by default.

  funding_extreme:
    enabled: true
    long_overheated_above: 0.00008   # +0.008% / 8h (was 0.010%)
    short_overheated_below: -0.00008 # -0.008% / 8h (was -0.010%)

  oi_surge:
    enabled: true
    window_minutes: 60
    pct_change_threshold: 0.025
    require_price_aligned: true

  lsr_extreme:
    enabled: true
    long_heavy_above: 2.0
    short_heavy_below: 0.70

  liq_cascade:
    enabled: true
    window_minutes: 5
    usd_threshold: 15_000_000

  # 1h EMA trend filter — drops counter-trend signals when the larger trend is clear.
  # Liquidation cascades are exempt: a long-flush in an uptrend (or short-squeeze
  # in a downtrend) is the highest-EV setup, so we don't filter those out.
  trend_filter:
    enabled: true
    ema_period: 50
    require_alignment: true

  # ─── Per-symbol threshold overrides ───────────────────────────────────────
  # Each watched symbol has its own "normal" funding/LSR/OI/liq distribution:
  # SOL moves wider than BTC, BTC has the deepest liq-book, etc. A single
  # global threshold either spams alts or starves majors, so each symbol gets
  # its own block. Numbers chosen to fire roughly the same number of triggers
  # per day across all three symbols (~1–3 in calm markets, more on active days).
  per_symbol:
    BTCUSDT:
      # Binance BTC funding 7d range: ~ -0.008% to +0.003%. Asymmetric
      # thresholds because the regime is bearish-skewed (negatives larger).
      # LONG side lowered by 0.002% per user request 2026-05-08:
      # -0.008% → -0.006%. SHORT side kept at +0.003% (per user feedback).
      funding_extreme:
        enabled: true
        long_overheated_above: 0.00003   # +0.003% (kept from PR #8)
        short_overheated_below: -0.00006 # -0.006% (was -0.008%)
      lsr_extreme:
        enabled: true
        long_heavy_above: 2.0
        short_heavy_below: 0.70
      oi_surge:
        enabled: true
        window_minutes: 60
        pct_change_threshold: 0.025      # 2.5% / 1h
        require_price_aligned: true
      liq_cascade:
        enabled: true
        window_minutes: 5
        usd_threshold: 15_000_000        # BTC liqs at multi-year lows in current regime

    ETHUSDT:
      funding_extreme:
        enabled: true
        long_overheated_above: 0.00003   # +0.003% (kept from PR #8)
        short_overheated_below: -0.00005 # -0.005% (was -0.007%)
      lsr_extreme:
        enabled: true
        long_heavy_above: 2.0
        short_heavy_below: 0.70
      oi_surge:
        enabled: true
        window_minutes: 60
        pct_change_threshold: 0.025
        require_price_aligned: true
      liq_cascade:
        enabled: true
        window_minutes: 5
        usd_threshold: 10_000_000

    SOLUSDT:
      # Binance SOL is in an INVERTED regime vs BTC/ETH right now: 7d
      # cumulative is +0.0742% (longs paying). Thresholds reflect this:
      # the "long_overheated" side is much wider, the "short_overheated"
      # side tighter (rare bearish print).
      # SHORT side lowered by 0.002% per user request: +0.012% → +0.010%.
      # LONG side kept at -0.005% (per user feedback).
      funding_extreme:
        enabled: true
        long_overheated_above: 0.00010   # +0.010% (was +0.012%)
        short_overheated_below: -0.00005 # -0.005% (kept from PR #8)
      lsr_extreme:
        enabled: true
        long_heavy_above: 2.2
        short_heavy_below: 0.65
      oi_surge:
        enabled: true
        window_minutes: 60
        pct_change_threshold: 0.030      # SOL OI moves faster than BTC/ETH
        require_price_aligned: true
      liq_cascade:
        enabled: true
        window_minutes: 5
        usd_threshold: 5_000_000         # SOL liq-book ~5–10x smaller than BTC

# ─── Exit rules (applied to the "virtual" position the bot tracks) ──────────
# The bot does NOT execute orders. It only TELLS you to exit, in three ways.

exits:
  # Volatility-adaptive SL/TP using 1h ATR(14).
  # When enabled and ATR is available, the bot sizes the stop and take-profit
  # ladders by ATR multiples instead of fixed percentages — so SL/TP scale
  # naturally with each symbol's current volatility (BTC tighter on quiet days,
  # SOL wider during chop). Falls back to the % values below when ATR isn't ready.
  atr_sizing:
    enabled: true
    sl_atr_mult: 1.5            # SL distance = 1.5 × ATR
    tp_atr_mults: [1.5, 3.0]    # TP1 / TP2 distances as ATR multiples
    fallback_to_pct: true

  # Fallback fixed SL/TP — used only when ATR isn't available (rare; only if
  # Binance klines fail to load on first poll).
  stop_loss_pct: 0.015  # 1.5%
  take_profit_levels:
    - { pct: 0.015, fraction: 0.5 }
    - { pct: 0.030, fraction: 0.5 }

  # Trailing stop: once price has moved this far in your favor, lock in
  # `lock_in_pct` of profit (move stop to entry + lock_in_pct).
  #
  # `activate_at_atr_mult` is the preferred trigger: trailing activates when
  # favorable_pct >= (mult × entry_atr_1h) / entry_price, so the trigger
  # scales with each symbol's actual volatility on entry. The fixed
  # `activate_at_pct` is used as a fallback when ATR was unavailable at
  # entry time (rare; first poll after a cold start before klines load).
  # Set `activate_at_atr_mult: null` to disable the ATR path entirely.
  trailing:
    enabled: true
    activate_at_atr_mult: 1.0   # activate at +1.0 × entry-ATR
    activate_at_pct: 0.008      # fallback: +0.8% (was 1.5%; logs showed it never triggered)
    lock_in_pct: 0.005          # lock in at least +0.5%

  # Time stop: close the position after this long if no other exit fired.
  # 8h aligns with Binance funding cycles, the source of our mean-reversion
  # signal -- below this, exits routinely cut winners before the funding edge
  # has had time to play out. See QC backtest variants BASELINE/D/B (commit
  # message of this change for numbers).
  time_stop_minutes: 480   # 8 hours

  # Reason-invalidation: close (near break-even) when the original entry thesis
  # has clearly broken.
  #   - funding_extreme → close once funding has retraced retrace_pct of the
  #                       way back toward zero from the entry-time value
  #                       (sign flips count as over-retraced)
  #   - lsr_extreme     → same idea, retracement toward neutral 1.0
  #   - oi_surge / liq_cascade → no metric to gate on, so we use a momentum
  #     check: if price has reversed against entry within window, bail early
  #
  # The previous absolute-band design was buggy: per-symbol funding triggers
  # like +0.003% are smaller than a 0.02% normalized band, so funding-entry
  # positions invalidated within the first exit-cycle every time. The
  # retrace-pct rule adapts to whatever per-symbol triggers we use.
  reason_invalidation:
    enabled: true
    funding_normalized_retrace_pct: 0.5        # invalidate after funding retraces 50% to zero
    lsr_normalized_retrace_pct: 0.5            # invalidate after LSR retraces 50% to neutral 1.0
    momentum_reversal_pct: 0.005               # 0.5% reverse against entry triggers early exit
    momentum_window_minutes: 60                # ...only within first 60 minutes after entry

# ─── Notifier formatting ────────────────────────────────────────────────────
notifier:
  # Per-symbol pretty names (optional; defaults to the symbol).
  pretty_names:
    BTCUSDT: BTC
    ETHUSDT: ETH
    SOLUSDT: SOL

  # Send a startup message on boot listing watched symbols + thresholds.
  send_startup_message: true

  # If true, every poll cycle that produces no signal is silent. If false, a
  # heartbeat is sent every `heartbeat_minutes`.
  silent_when_idle: true
  heartbeat_minutes: 60

  # Daily liveness ping — sent once per UTC day at this hour, even when
  # `silent_when_idle: true`. Lets you notice a silent dead bot quickly.
  # Set to null to disable.
  daily_liveness_hour_utc: 8

  # How often to poll Telegram for incoming /start commands (seconds).
  command_poll_interval_seconds: 5

# ─── Cross-exchange liquidation aggregator ──────────────────────────────────
# Public WebSocket streams only — no API keys, no rate limits. Each exchange
# runs in its own task and reconnects independently with backoff, so a single
# exchange outage does not affect the others. Add/remove names freely.
liquidations:
  exchanges:
    - binance   # wss://fstream.binance.com/ws/!forceOrder@arr
    - bybit     # wss://stream.bybit.com/v5/public/linear (allLiquidation.{symbol})

# ─── Weekly stats digest ────────────────────────────────────────────────────
# Once a week the bot reads positions.jsonl and sends a summary to Telegram:
# total signals, win-rate by signal type, average PnL, etc.
stats:
  enabled: true
  weekday: 0       # 0=Mon, 1=Tue, ..., 6=Sun
  hour_utc: 12     # send at 12:00 UTC every Monday
  window_days: 7   # rolling window of positions to summarize

  # Per-fill fee + slippage subtracted from realized PnL when computing the
  # digest. Defaults model Binance USD-M futures *taker*: 0.05% commission
  # plus a conservative 0.02% slippage estimate per fill. Each closed
  # position pays exactly two fills' worth (entry + exit), so the round-trip
  # subtracted is 2 × (commission + slippage) = 0.14% per position by default.
  # Set `enabled: false` to revert to the previous gross-PnL math.
  fees:
    enabled: true
    commission_per_fill: 0.0005   # 0.05% per fill (5 bps)
    slippage_per_fill: 0.0002     # 0.02% per fill (2 bps)


# ─── Risk management ───────────────────────────────────────────────────────
# Pre-trade guards applied before opening any new position. Independent of
# signal strength: they enforce dispersion, debounce reopens, and keep the
# log readable.
risk:
  # Hard cap on simultaneously open virtual positions across all symbols.
  max_concurrent_positions: 2

  # Per-direction cap *within each correlated group* (NOT global). With the
  # default `correlated_groups: [[BTCUSDT, ETHUSDT]]`, the bot will not hold
  # two LONG-BTC and LONG-ETH at the same time — they are ~0.9 correlated and
  # acting as one 2x beta bet — but a SOL LONG is still allowed in parallel
  # because SOL is outside every group. null disables.
  max_per_direction: 1

  # Symbols that should be treated as one for `max_per_direction`. Each list
  # is one group; symbols not in any list are unrestricted. BTC/ETH have
  # ~0.9 30-day return correlation, SOL ~0.7 — the heuristic is loose on
  # purpose, refine later from realized data.
  correlated_groups:
    - [BTCUSDT, ETHUSDT]

  # After ANY exit (SL/TP/TIME_STOP/REASON_INVALIDATED), block same-side
  # re-entry on the same symbol for this many seconds. The 6-hour log we
  # debugged showed 7 reopens within 30 minutes of a close, all of which
  # were losing the same way; this gate stops that. Set 0 to disable.
  post_exit_cooldown_seconds: 7200   # 2 hours

  # Deduplication window for skip-reason INFO logs. When the same
  # (symbol, direction, reason) triplet repeats inside this window, the
  # message is suppressed (the current state is still emitted at the next
  # state transition or after the window elapses). 0 disables dedup.
  skip_log_interval_seconds: 1800    # 30 minutes

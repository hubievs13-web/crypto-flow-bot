# Fly.io configuration for crypto-flow-bot.
# Run `fly secrets set TELEGRAM_BOT_TOKEN=... TELEGRAM_CHAT_IDS=...` before first deploy.

app = "crypto-flow-bot"
primary_region = "fra"  # Frankfurt; pick the region nearest you.

[build]

# Persistent volume for state.json and JSONL logs.
# IMPORTANT: mount inside /app/state (NOT /app) so we don't shadow the code/config.
# Create once with: fly volumes create state --size 1 --region fra
[mounts]
  source = "state"
  destination = "/app/state"

[env]
  PYTHONUNBUFFERED = "1"
  CRYPTO_FLOW_BOT_LOG_LEVEL = "INFO"
  CRYPTO_FLOW_BOT_CONFIG = "/app/config.yaml"
  CRYPTO_FLOW_BOT_STATE_DIR = "/app/state"
  CRYPTO_FLOW_BOT_LOG_DIR = "/app/state/logs"

# Long-running worker process — no public HTTP server.
[processes]
  app = "python -m crypto_flow_bot"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory = "256mb"
